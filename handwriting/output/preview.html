<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Handwriting Preview</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #fffdf8;
      --ink: #171411;
      --line: #d8cfbf;
      --accent: #8d5e2a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px;
      background:
        radial-gradient(circle at top left, rgba(141, 94, 42, 0.18), transparent 30%),
        linear-gradient(180deg, #f7f1e4, var(--bg));
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", sans-serif;
    }
    h1 { margin-top: 0; font-size: 30px; }
    p { max-width: 780px; line-height: 1.6; }
    .summary {
      display: inline-flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 8px 0 24px;
    }
    .summary span {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(141, 94, 42, 0.1);
      color: var(--accent);
      font-size: 14px;
    }
    .page-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 28px rgba(56, 39, 21, 0.08);
    }
    .page-pair {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      margin-bottom: 18px;
    }
    .page-pair img, .lines-grid img {
      width: 100%;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: white;
    }
    .lines-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    figure {
      margin: 0;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
    }
    figcaption {
      margin-top: 8px;
      min-height: 40px;
      color: #5a5148;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>手写样本自动整理预览</h1>
